apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: aksel-mcp-server
spec:
  image: ghcr.io/navikt/aksel-mcp-server:__IMAGE_TAG__
  port: 8080
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  liveness:
    path: /isalive
    initialDelay: 5
  readiness:
    path: /isready
    initialDelay: 5
