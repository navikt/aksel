apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: aksel-mcp-server
  namespace: {{namespace}}
  labels:
    team: {{team}}
spec:
  image: {{image}}
  port: 8080
  replicas:
    min: {{replicas_min}}
    max: {{replicas_max}}
  resources:
    limits:
      memory: {{memory_limit}}
    requests:
      cpu: {{cpu_request}}
      memory: {{memory_request}}
  liveness:
    path: /isalive
    initialDelay: 5
    timeout: 1
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /isready
    initialDelay: 5
    timeout: 1
    periodSeconds: 10
    failureThreshold: 3
  prometheus:
    enabled: true
    path: /metrics
  ingresses:
    - {{ingress}}
  accessPolicy:
    outbound:
      external:
        - host: aksel.nav.no